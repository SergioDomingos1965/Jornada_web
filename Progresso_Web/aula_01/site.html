<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <h1>Conversor de dolares </h1>
     <input placeholder="Valores em kz" type="number">
     <button onclick="Converter()">Converter</button>
</body>
<script>
    const valor_real = document.querySelector("input");
    document.querySelector("h1").style.color = "red";
     function Converter()
     {
        const valor_convertido = valor_real.value / 1150;
        alert(`O valor em dolar e ${valor_convertido}`);
     }
</script>
</html>
